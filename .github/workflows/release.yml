name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-20.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/test_git_sync.py -v
          
      - name: Build executable
        run: |
          pyinstaller build.spec --clean
          
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Create release archive
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p release
          cp dist/git-sync release/git-sync-${VERSION}-linux-x86_64
          cp config/git-sync.yaml.example release/
          cp README.md release/
          tar -czvf git-sync-${VERSION}-linux-x86_64.tar.gz -C release \
            git-sync-${VERSION}-linux-x86_64 \
            git-sync.yaml.example \
            README.md
            
      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          cat > release_notes.md << EOF
          ## System Requirements
          
          - Ubuntu 20.04+ / Debian 11+ (GLIBC 2.31+)
          - git CLI (required)
          
          ## Installation
          
          \`\`\`bash
          # Download
          wget https://github.com/${{ github.repository }}/releases/download/v${VERSION}/git-sync-${VERSION}-linux-x86_64.tar.gz
          
          # Extract
          tar -xzf git-sync-${VERSION}-linux-x86_64.tar.gz
          
          # Setup
          sudo mkdir -p /etc/git-sync
          sudo cp git-sync.yaml.example /etc/git-sync/config.yaml
          sudo nano /etc/git-sync/config.yaml
          
          # Run
          ./git-sync-${VERSION}-linux-x86_64 sync
          \`\`\`
          
          ## CLI Usage
          
          \`\`\`bash
          # Show help
          git-sync --help
          
          # Sync all repos
          git-sync sync
          
          # Sync specific repo
          git-sync sync -r my-repo
          
          # Show status
          git-sync status
          
          # Validate config
          git-sync config validate
          
          # Debug logging
          git-sync -l DEBUG sync
          \`\`\`
          
          ## Config Example
          
          See \`git-sync.yaml.example\` in the release archive.
          
          Full documentation: https://github.com/${{ github.repository }}#readme
          EOF
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: git-sync-${{ steps.get_version.outputs.version }}-linux-x86_64.tar.gz
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
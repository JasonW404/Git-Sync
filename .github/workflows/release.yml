name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
          - os: windows-latest
            platform: windows
            arch: x86_64
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run tests (Linux)
        if: matrix.platform == 'linux'
        run: |
          PYTHONPATH=src pytest tests/test_git_sync.py -v
          
      - name: Run tests (Windows)
        if: matrix.platform == 'windows'
        run: |
          $env:PYTHONPATH = "src"
          pytest tests/test_git_sync.py -v
          
      - name: Build executable (Linux)
        if: matrix.platform == 'linux'
        run: |
          pyinstaller build.spec --clean
          
      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller build.spec --clean
          
      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Create release archive (Linux)
        if: matrix.platform == 'linux'
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p release
          cp dist/git-sync release/git-sync-${VERSION}-linux-x86_64
          cp config/git-sync.yaml.example release/
          cp README.md release/
          tar -czvf git-sync-${VERSION}-linux-x86_64.tar.gz -C release \
            git-sync-${VERSION}-linux-x86_64 \
            git-sync.yaml.example \
            README.md
            
      - name: Create release archive (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          mkdir -p release
          cp dist/git-sync.exe release/git-sync-${VERSION}-windows-x86_64.exe
          cp config/git-sync.yaml.example release/
          cp README.md release/
          7z a -tzip git-sync-${VERSION}-windows-x86_64.zip \
            release/git-sync-${VERSION}-windows-x86_64.exe \
            release/git-sync.yaml.example \
            release/README.md
            
      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: git-sync-${{ steps.get_version.outputs.version }}-linux-x86_64.tar.gz
          
      - name: Upload artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: git-sync-${{ steps.get_version.outputs.version }}-windows-x86_64.zip

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          
      - name: Generate release notes
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          REPO=${{ github.repository }}
          cat > release_notes.md << HEREDOC
          ## System Requirements
          
          **Linux:**
          - Ubuntu 22.04+ / Debian 12+ (GLIBC 2.35+)
          - git CLI (required)
          
          **Windows:**
          - Windows 10/11 (64-bit)
          - git CLI (required)
          
          Note: Built on Ubuntu 22.04 / Windows Server for compatibility.
          
          ## Installation
          
          All paths are relative to the working directory. No root/admin required.
          
          ### Linux
          
          \`\`\`bash
          # Download
          wget https://github.com/${REPO}/releases/download/v${VERSION}/git-sync-${VERSION}-linux-x86_64.tar.gz
          
          # Extract
          tar -xzf git-sync-${VERSION}-linux-x86_64.tar.gz
          
          # Create working directory
          mkdir -p my-sync && cd my-sync
          
          # Copy config
          cp ../git-sync.yaml.example ./config.yaml
          
          # Edit config
          nano config.yaml
          
          # Run (data in ./data/)
          ../git-sync-${VERSION}-linux-x86_64 sync
          \`\`\`
          
          ### Windows
          
          \`\`\`powershell
          # Download
          Invoke-WebRequest -Uri "https://github.com/${REPO}/releases/download/v${VERSION}/git-sync-${VERSION}-windows-x86_64.zip" -OutFile "git-sync.zip"
          
          # Extract
          Expand-Archive -Path "git-sync.zip" -DestinationPath "."
          
          # Create working directory
          mkdir my-sync; cd my-sync
          
          # Copy config
          copy ..\git-sync.yaml.example config.yaml
          
          # Edit config
          notepad config.yaml
          
          # Run (data in .\data\)
          ..\git-sync-${VERSION}-windows-x86_64.exe sync
          \`\`\`
          
          ## Default Paths
          
          | Path | Default | Description |
          |------|---------|-------------|
          | Config file | ./config.yaml | Configuration file |
          | State dir | ./data/state | Sync state database |
          | Repo dir | ./data/repos | Local repo clones |
          
          Override with \`-c/--config\` or in \`settings:\` section.
          
          ## CLI Usage
          
          \`\`\`bash
          git-sync --help
          git-sync sync
          git-sync sync -r my-repo
          git-sync status
          git-sync config validate
          git-sync -l DEBUG sync
          \`\`\`
          
          Full docs: https://github.com/${REPO}#readme
          HEREDOC
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            git-sync-${{ steps.get_version.outputs.version }}-linux-x86_64.tar.gz
            git-sync-${{ steps.get_version.outputs.version }}-windows-x86_64.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
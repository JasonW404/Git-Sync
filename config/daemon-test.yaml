version: 1

settings:
  repo_dir: /tmp/git-sync-daemon-work
  default_schedule: "* * * * *"  # 每分钟执行一次（用于测试）
  timezone: "Asia/Shanghai"
  max_concurrent: 1
  unmapped_author_policy: warn

author_mappings:
  - match_email: "jasonwong2019@outlook.com"
    internal_name: "WangJL"
    internal_email: "jason_wjl@qq.com"

sync_tasks:
  - name: daemon-test
    schedule: "* * * * *"  # 每分钟
    repos:
      - id: github-trending-analysis
        github_url: git@github.com:JasonW404-HW/github-trending-analysis.git
        internal_url: /tmp/git-sync-daemon-internal
        branches: ["main"]
        auth:
          type: ssh